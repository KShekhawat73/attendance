<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Store Attendance Portal</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; transition: all 0.3s ease; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); color: #333; padding: 20px; width: 100vw; min-height: 100vh; display: block; overflow-x: hidden; }
    .container { width: 100%; max-width: 450px; margin: 30px auto; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); transform: translateY(0); opacity: 0; animation: fadeInUp 0.6s ease forwards; }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    h2 { text-align: center; color: #007bff; font-size: 1.6rem; margin-bottom: 20px; font-weight: 700; position: relative; }
    label { font-weight: 600; display: block; margin-top: 18px; font-size: 0.9rem; color: #495057; }
    input, textarea { width: 100%; padding: 12px; margin-top: 6px; border: 2px solid #dee2e6; border-radius: 8px; font-size: 1rem; background-color: #fff; }
    button { width: 100%; padding: 14px; color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: bold; cursor: pointer; margin-top: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    button:disabled { background-color: #cccccc !important; cursor: not-allowed; }
    #locationBtn { background: linear-gradient(45deg, #ffc107, #ff9800); color: #fff; }
    #captureBtn { background: linear-gradient(45deg, #007bff, #0056b3); }
    #submitBtn { background: linear-gradient(45deg, #28a745, #218838); margin-top: 25px; }
    #video { width: 100%; height: auto; aspect-ratio: 4/3; background: #000; margin-top: 8px; border-radius: 8px; object-fit: cover; }
    #canvas { display: none; }
    #snapshot { width: 100%; height: auto; aspect-ratio: 4/3; margin-top: 8px; display: none; border-radius: 8px; object-fit: cover; border: 2px solid #28a745; }
    .status { text-align: center; font-weight: bold; margin-top: 15px; font-size: 0.95rem; color: #dc3545; padding: 10px; border-radius: 6px; background: rgba(220, 53, 69, 0.1); }
    #successOverlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #ffffff; z-index: 9999; justify-content: center; align-items: center; flex-direction: column; text-align: center; padding: 20px; }
    .success-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); max-width: 400px; }
    .success-icon-circle { width: 80px; height: 80px; background: #e8f5e9; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px auto; color: #28a745; font-size: 3rem; }
    .success-title { color: #28a745; font-size: 1.8rem; font-weight: bold; margin-bottom: 12px; }
    .success-card p { color: #6c757d; font-size: 1rem; }
  </style>
</head>
<body>

<div class="container" id="mainContainer">
  <h2>Store Check-In</h2>
  
  <button type="button" id="locationBtn">📍 Step 1: Verify Live GPS Location</button>
  <div id="status" class="status">⚠️ Awaiting Location. Please click the orange button above first.</div>

  <form id="attendanceForm">
    <label>Manager Name</label>
    <input type="text" id="managerName" placeholder="Enter your full name" required>

    <label>Store Name</label>
    <input type="text" id="storeName" placeholder="Enter store branch name" required>

    <label>Selfie Verification</label>
    <video id="video" autoplay playsinline muted></video>
    <button type="button" id="captureBtn">Step 2: Activate Camera</button>
    <canvas id="canvas"></canvas>
    <img id="snapshot" alt="Selfie preview">

    <label>Remarks</label>
    <textarea id="remarks" rows="2" placeholder="Any update or remarks (Optional)"></textarea>

    <input type="hidden" id="latitude" value="">
    <input type="hidden" id="longitude" value="">

    <button type="submit" id="submitBtn" disabled>Fill Details & Verify Location First</button>
  </form>
</div>

<div id="successOverlay">
  <div class="success-card">
    <div class="success-icon-circle">✓</div>
    <div class="success-title">Success!</div>
    <p>Your attendance, live selfie, and GPS coordinates have been safely marked.</p>
  </div>
</div>

<script>
  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  const snapshot = document.getElementById('snapshot');
  const captureBtn = document.getElementById('captureBtn');
  const locationBtn = document.getElementById('locationBtn');
  const submitBtn = document.getElementById('submitBtn');
  const statusDiv = document.getElementById('status');
  let selfieDataUrl = "";
  let streamActive = false;
  let locationFetched = false;

  locationBtn.addEventListener('click', () => {
    statusDiv.innerText = "🔄 Fetching GPS satellite data... Please wait.";
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(
        (position) => {
          document.getElementById('latitude').value = position.coords.latitude;
          document.getElementById('longitude').value = position.coords.longitude;
          locationFetched = true;
          statusDiv.innerText = "✅ Location Locked Successfully!";
          statusDiv.style.color = "#28a745";
          statusDiv.style.background = "rgba(40, 167, 69, 0.1)";
          locationBtn.style.background = "linear-gradient(45deg, #28a745, #218838)";
          locationBtn.innerText = "✅ GPS Location Verified";
          checkFormReady();
        },
        (err) => {
          statusDiv.innerText = "❌ GPS Error! Please turn on device GPS/Location service settings.";
          alert("Location Permission Blocked! Please make sure your phone GPS is ON and you allowed browser location permission.");
        },
        { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
      );
    }
  });

  async function startCamera() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false });
      video.srcObject = stream;
      streamActive = true;
      captureBtn.textContent = "Capture Photo 📸";
    } catch (err) {
      alert("Please allow camera access.");
    }
  }

  captureBtn.addEventListener('click', () => {
    if (!streamActive) { startCamera(); } else {
      const context = canvas.getContext('2d');
      canvas.width = video.videoWidth || 320;
      canvas.height = video.videoHeight || 240;
      context.drawImage(video, 0, 0, canvas.width, canvas.height);
      selfieDataUrl = canvas.toDataURL('image/jpeg', 0.5);
      snapshot.src = selfieDataUrl;
      snapshot.style.display = 'block';
      video.style.display = 'none';
      captureBtn.textContent = "Retake Selfie 🔄";
      streamActive = false;
      if(video.srcObject) video.srcObject.getTracks().forEach(track => track.stop());
      checkFormReady();
    }
  });

  function checkFormReady() {
    if (locationFetched && selfieDataUrl !== "") {
      submitBtn.disabled = false;
      submitBtn.textContent = "Submit Attendance 🚀";
    }
  }

  document.getElementById('attendanceForm').addEventListener('submit', function(e) {
    e.preventDefault();
    if (!selfieDataUrl) { alert("Please take a selfie first."); return; }
    if (!locationFetched) { alert("Please verify location first."); return; }
    
    submitBtn.disabled = true;
    submitBtn.textContent = "Submitting Data... ⏳";

    // Dynamic Parameter Injection using standard POST URL string format
    const formData = new URLSearchParams();
    formData.append('managerName', document.getElementById('managerName').value);
    formData.append('storeName', document.getElementById('storeName').value);
    formData.append('remarks', document.getElementById('remarks').value);
    formData.append('latitude', document.getElementById('latitude').value);
    formData.append('longitude', document.getElementById('longitude').value);
    formData.append('selfie', selfieDataUrl);

    fetch("https://script.google.com/macros/s/AKfycbzIQrtxeJRhn7SaSgaFzvK3aPny2B1_c4d_-bjHqGDdm5DbjyfYwQj8eZ33BDus9Mds/exec", {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "application/x-www-form-urlencoded" }, 
      body: formData.toString()
    }).then(() => {
      document.getElementById('mainContainer').style.display = 'none';
      document.getElementById('successOverlay').style.display = 'flex';
    }).catch(err => {
      alert("Submission Error: " + err);
      submitBtn.disabled = false;
    });
  });
</script>

</body>
</html>
