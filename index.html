<!DOCTYPE html>
<html>
<head>

  <style>
    body { font-family: Arial, sans-serif; text-align: center; padding-top: 60px; background: #f4f4f9; color: #333; }

      // Yeh aapka naya Apps Script URL hai jo mobile session ko bypass karega

      setTimeout(function() {
        window.location.replace(targetUrl);

    };
